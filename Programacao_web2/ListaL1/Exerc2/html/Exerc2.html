<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Primeiro exercicio pratico</title>
    <link href="../css/formata-pagina.css" rel="stylesheet">
</head>
<body>

    <h1>Atividade Pratica de POO em php</h1>

    <form action="../php/Exerc2.php" method="post">
        <fieldset>
            <legend>Autopeças AAA - Casdastro de veiculos populares</legend>
            <label>Fabricante: </label><br>
            <input type="text" name="fabri" id="fabri" autofocus placeholder="Fabricante">
            <br>
            <label>Modelo: </label><br>
            <input type="text" name="model" id="model" placeholder="Modelo">
            <br>
            <label>Preço de venda: </label><br>
            <input type="number" name="price" id="price" min="0" step="0.01" placeholder="Preço de venda">

            <button>Cadastrar Veiculo e Valor</button>
        </fieldset>
    </form>

</body>
